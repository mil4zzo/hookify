services:
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: hookify-backend
    restart: unless-stopped
    # Vars de runtime do backend vêm 100% de ../backend/.env (env_file abaixo).
    # Não duplicar com "- VAR=${VAR}" no environment: lá o ${VAR} é resolvido
    # pelo docker-compose contra deploy/.env (ou shell), e quando vazio sobrescreve
    # o valor do env_file com string vazia.
    environment:
      - CORS_ORIGINS=https://hookifyads.com,https://www.hookifyads.com,https://api.hookifyads.com
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - ../backend/.env
    networks:
      - hookify-network
    labels:
      - "traefik.enable=true"
      # Rota via hookifyads.com/api (proxied pelo Cloudflare - sem uploads grandes)
      - "traefik.http.routers.backend.rule=Host(`hookifyads.com`) && (PathPrefix(`/api`) || PathPrefix(`/facebook`) || PathPrefix(`/analytics`) || Path(`/health`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=backend-stripprefix"
      # Rota via api.hookifyads.com (DNS only no Cloudflare - sem limite de 100MB)
      - "traefik.http.routers.backend-direct.rule=Host(`api.hookifyads.com`)"
      - "traefik.http.routers.backend-direct.entrypoints=websecure"
      - "traefik.http.routers.backend-direct.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.backend-direct.service=backend"
      - "traefik.docker.network=hookify-network"

  frontend:
    # IMPORTANTE: build args do Next.js são resolvidos em build-time, então
    # NÃO podem vir de env_file (que injeta só em runtime). Os ${NEXT_PUBLIC_*}
    # e ${SENTRY_*} abaixo precisam estar em deploy/.env (ou exportados no shell)
    # ANTES do `docker compose build/up`, senão são embedados como string vazia
    # no bundle do Next e o app sobe sem URL do Supabase no cliente.
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://api.hookifyads.com}
        - NEXT_PUBLIC_FB_REDIRECT_URI=${NEXT_PUBLIC_FB_REDIRECT_URI:-https://hookifyads.com/callback}
        - NEXT_PUBLIC_USE_REMOTE_API=${NEXT_PUBLIC_USE_REMOTE_API:-true}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
        - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
        - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
        - SENTRY_ORG=${SENTRY_ORG}
        - SENTRY_PROJECT=${SENTRY_PROJECT}
    container_name: hookify-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Remover as outras - já estão no env_file e nos build args
    env_file:
      - ../frontend/.env.local
    networks:
      - hookify-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`hookifyads.com`) || Host(`www.hookifyads.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.frontend-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.frontend.middlewares=frontend-headers"
      - "traefik.docker.network=hookify-network"

networks:
  hookify-network:
    external: true

