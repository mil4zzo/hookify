name: Security

# Esteira de segurança: roda em PR e em push na main. Cada job é independente —
# um achado em SAST não esconde um vazamento de segredo.
#
# Gates que FALHAM o build (bloqueiam o merge):
#   - secrets: segredo commitado (teria pego o achado #2 da security review)
#   - deps: vulnerabilidade high+ em npm ou pip (trava a regressão do #7a: base está em 0)
#   - build: erro de tipo (o next.config.ts não ignora mais type errors — ver #6)
#
# Gates que apenas REPORTAM (não falham): SAST. Semgrep/bandit têm falso-positivo
# demais para bloquear merge sem uma fase de triagem — subir para bloqueante depois
# de zerar o backlog inicial.

on:
  pull_request:
  push:
    branches: [main]

# Cancela runs antigas do mesmo branch quando um novo push chega.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks precisa do histórico para varrer commits, não só o working tree.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps-frontend:
    name: Deps frontend (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Base está em 0 vulnerabilidades (2026-07-12). Qualquer high+ nova falha aqui.
      - run: npm audit --audit-level=high

  deps-backend:
    name: Deps backend (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt

  build:
    name: Build + type-check (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run check:design-system
      # Vars NEXT_PUBLIC_* são embedadas em build-time. Valores dummy: este job só
      # valida que compila — não sobe nada. Não usar segredos reais aqui.
      - name: next build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: dummy-key-for-ci
          NEXT_PUBLIC_FB_REDIRECT_URI: https://example.invalid/callback

  tests-backend:
    name: Testes backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r backend/requirements.txt pytest
      - run: python -m pytest tests/ -q
        working-directory: backend

  sast:
    name: SAST (semgrep + bandit) — report-only
    runs-on: ubuntu-latest
    # Não bloqueia merge ainda: zerar o backlog inicial primeiro, depois remover esta linha.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install semgrep bandit
      - name: semgrep
        run: semgrep --config auto --error --skip-unknown-extensions .
      - name: bandit
        run: bandit -r backend/app -ll
